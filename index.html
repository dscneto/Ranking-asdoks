<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASDOKS — Ranking Karatê</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="nav-overlay" id="navOverlay"></div>

  <div class="app-shell">

    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <div class="brand">
          <div class="brand__logo">AS</div>
          <div class="brand__text">
            <strong>ASDOKS</strong>
            <small>Ranking Karatê</small>
          </div>
        </div>
        <button class="icon-btn sidebar__close" id="sidebarClose" aria-label="Fechar menu">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <nav class="nav-menu" id="navMenu">
        <a href="#/ranking" class="nav-menu__item" data-route="ranking">
          <span class="nav-menu__icon">🏆</span> Ranking
        </a>
        <a href="#/atletas" class="nav-menu__item" data-route="atletas">
          <span class="nav-menu__icon">🥋</span> Atletas
        </a>
        <a href="#/competicoes" class="nav-menu__item" data-route="competicoes">
          <span class="nav-menu__icon">📅</span> Competições
        </a>
        <a href="#/resultados" class="nav-menu__item" data-route="resultados">
          <span class="nav-menu__icon">📊</span> Lançar Resultados
        </a>
        <a href="#/tipos" class="nav-menu__item" data-route="tipos">
          <span class="nav-menu__icon">⚖️</span> Tipos de Competição
        </a>
        <a href="#/configuracoes" class="nav-menu__item" data-route="configuracoes">
          <span class="nav-menu__icon">⚙️</span> Configurações
        </a>
      </nav>

      <div class="sidebar__footer">
        <span class="sidebar__footer-text">Associação Dória de Karatê Shotokan</span>
      </div>
    </aside>

    <div class="main-area">
      <header class="topbar">
        <button class="icon-btn hamburger" id="hamburgerBtn" aria-label="Abrir menu">
          <svg viewBox="0 0 24 24" width="22" height="22"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <h1 class="topbar__title" id="pageTitle">Ranking</h1>
      </header>

      <main class="content" id="appContent"></main>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <div class="modal__header">
        <h2 class="modal__title" id="modalTitle">Título</h2>
        <button class="icon-btn" id="modalClose" aria-label="Fechar">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="modal__body" id="modalBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/constants.js"></script>
  <script src="js/db.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/ui-helpers.js"></script>
  <script src="js/views/ranking.js"></script>
  <script src="js/views/athletes.js"></script>
  <script src="js/views/athleteDetail.js"></script>
  <script src="js/views/competitions.js"></script>
  <script src="js/views/results.js"></script>
  <script src="js/views/competitionTypes.js"></script>
  <script src="js/views/settings.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
